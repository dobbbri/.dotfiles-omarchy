services:
  
  db:
    # We use a mariadb image which supports both amd64 & arm64 architecture
    image: mariadb:latest
    # If you really want to use MySQL, uncomment the following line
    #image: mysql:8.0.27
    container_name: ${CONTAINER_NAME}-db
    command: '--default-authentication-plugin=mysql_native_password'
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - 3306
      - 33060
    deploy:
      resources:
        limits:
          memory: 512M   # Hard limit (container stops if exceeded)
        reservations:
          memory: 256M   # Soft limit (guaranteed minimum)
  
  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    container_name: ${CONTAINER_NAME}-wp
    restart: always
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: "db:${DB_PORT}"
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - wp_data:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./src:/var/www/html/wp-content:rw
    deploy:
      resources:
        limits:
          memory: 1G     # WordPress with several plugins often needs more than 512MB
        reservations:
          memory: 512M
volumes:
  db_data:
  wp_data:

