services:

  db:
    image: mariadb:latest
    container_name: ${CONTAINER_NAME}-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512m

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: ${CONTAINER_NAME}-wp
    restart: always
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: "db:${DB_PORT}"
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      # - wordpress:/var/www/html
      - ./wordpress:/var/www/html:rw

volumes:
  wordpress:
  db:

 # sudo chmod -R a+rw wordpress/

# Themes go in a subdirectory in /var/www/html/wp-content/themes/
# Plugins go in a subdirectory in /var/www/html/wp-content/plugins/
#
# If you wish to provide additional content in an image for deploying in multiple installations, 
# place it in the same directories under /usr/src/wordpress/
# instead (which gets copied to /var/www/html/ on the container's initial startup).
